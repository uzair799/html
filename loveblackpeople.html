<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Love Black People</title>
	<style>
		body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcf7f, #4d96ff, #d946ef); min-height: 100vh; }
		main { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); border-left: 5px solid #ff6b6b; }
		h1 { background: linear-gradient(90deg, #ff6b6b, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 2.5em; }
		h2 { color: #4d96ff; }
		p { color: #555; line-height: 1.6; font-size: 1.1em; }
		ul { color: #333; line-height: 1.8; }
		li { margin-bottom: 10px; }
		li:before { content: "✓ "; color: #6bcf7f; font-weight: bold; margin-right: 8px; }
		a.button { display: inline-block; padding: 12px 25px; background: linear-gradient(90deg, #ff6b6b, #d946ef); color: white; text-decoration: none; border-radius: 25px; margin-top: 15px; font-weight: bold; transition: transform 0.2s; }
		a.button:hover { transform: scale(1.05); }
		footer { margin-top: 30px; padding-top: 20px; border-top: 2px solid #ffd93d; color: #666; font-size: 0.95em; text-align: center; font-style: italic; }
	</style>
</head>
<body>
	<main>
		<h1>Love Black People</h1>
		<p>A simple page to celebrate, support, and uplift Black lives and Black joy.</p>

		<section>
			<h2>How to help</h2>
			<ul>
				<li>Listen and amplify Black voices</li>
				<li>Support Black-owned businesses</li>
				<li>Donate or volunteer locally</li>
			</ul>
			<a class="button" href="https://www.naacp.org" target="_blank" rel="noopener">Visit NAACP</a>
		</section>

		<footer>Built to celebrate Black lives — learn, act, and uplift.</footer>
	</main>
</body>
</html>
